<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build n Share | Local AI Edition</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0a; --panel: #121212; --accent: #00ff88;
            --text: #ffffff; --border: #222; --error: #ff4444;
            --chat-bg: #1a1a1a;
        }
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg); color: var(--text); overflow: hidden;
        }
        .container { display: grid; grid-template-columns: 260px 1fr; height: 100vh; }
        
        /* Sidebar */
        .sidebar { background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; }
        .logo { font-size: 1.1rem; font-weight: bold; color: var(--accent); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #333; }
        .status-dot.online { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
        
        .nav-tabs { display: flex; background: #000; padding: 5px; border-radius: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; background: transparent; border: none; color: #666; padding: 8px; cursor: pointer; font-size: 0.8rem; border-radius: 4px; }
        .tab-btn.active { background: #222; color: white; }
        
        .app-list { flex-grow: 1; overflow-y: auto; }
        .app-card { padding: 12px; background: #1a1a1a; border-radius: 6px; margin-bottom: 10px; cursor: pointer; border: 1px solid transparent; }
        .app-card:hover { border-color: var(--accent); }
        .app-card-name { font-size: 0.85rem; font-weight: 500; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .app-actions { display: flex; gap: 10px; }
        .action-link { font-size: 0.7rem; color: #888; text-decoration: underline; cursor: pointer; }
        .action-link:hover { color: var(--accent); }

        /* Main Content */
        .main { display: flex; flex-direction: column; position: relative; background: #000; }
        .browser-header { background: var(--panel); padding: 10px; display: flex; gap: 10px; border-bottom: 1px solid var(--border); align-items: center;}
        .url-bar { flex-grow: 1; background: #000; border: 1px solid var(--border); border-radius: 4px; padding: 6px 12px; color: var(--accent); font-family: monospace; font-size: 0.8rem; }
        .preview-frame { flex-grow: 1; background: white; border: none; }

        /* Chat Button & Panel */
        .chat-toggle-btn {
            background: var(--accent); color: black; border: none; padding: 8px 15px;
            border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.8rem;
        }

        .chat-panel {
            position: fixed; bottom: 20px; right: 20px; width: 350px; height: 500px;
            background: var(--chat-bg); border: 1px solid var(--border); border-radius: 12px;
            display: none; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000;
        }
        .chat-header { padding: 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #222; border-radius: 12px 12px 0 0; }
        .chat-messages { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; font-size: 0.9rem; }
        .chat-input-area { padding: 10px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
        .chat-msg { padding: 8px 12px; border-radius: 8px; max-width: 80%; word-wrap: break-word; }
        .chat-msg.user { align-self: flex-end; background: var(--accent); color: black; }
        .chat-msg.ai { align-self: flex-start; background: #333; color: white; }
        
        /* Prompt Bar */
        .prompt-wrap {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 800px; background: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(10px); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px; box-shadow: 0 15px 40px rgba(0,0,0,0.7);
        }
        .prompt-input-row { display: flex; gap: 10px; }
        input#prompt-input { flex-grow: 1; background: transparent; border: none; color: white; outline: none; font-size: 1rem; }
        
        .btn { background: var(--accent); color: black; border: none; padding: 8px 18px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:disabled { background: #444; color: #888; cursor: not-allowed; }
        .settings-btn { background: transparent; border: 1px solid #333; color: #888; padding: 8px; border-radius: 6px; cursor: pointer; }

        /* Modals */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; padding: 20px; align-items: center; justify-content: center;}
        .modal-content { background: var(--panel); padding: 25px; border-radius: 12px; border: 1px solid var(--border); width: 90%; max-width: 700px; display: flex; flex-direction: column; gap: 15px;}
        
        textarea.code-box { flex-grow: 1; background: #000; color: #00ff88; font-family: 'Fira Code', monospace; padding: 15px; border: 1px solid var(--border); min-height: 400px; resize: none; font-size: 0.85rem;}
        
        .setting-group { display: flex; flex-direction: column; gap: 5px; }
        .setting-group label { font-size: 0.75rem; color: #888; }
        .setting-group input, .setting-group textarea { background: #000; border: 1px solid var(--border); color: white; padding: 8px; border-radius: 4px; }
        .setting-row { display: flex; gap: 15px; }
        .setting-row > div { flex: 1; }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div class="logo"><div id="status-dot" class="status-dot"></div> Build n Share</div>
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="setTab('explore')">Explore</button>
            <button class="tab-btn" onclick="setTab('mine')">My Apps</button>
        </div>
        <div id="app-list" class="app-list"></div>
    </div>

    <div class="main">
        <div class="browser-header">
            <input type="text" class="url-bar" id="url-display" value="https://websim.ai/local-qwen" readonly>
            <button class="chat-toggle-btn" onclick="toggleChat()">💬 Chat</button>
        </div>
        <iframe id="preview-frame" class="preview-frame" sandbox="allow-scripts allow-modals allow-forms allow-popups allow-same-origin"></iframe>

        <div class="prompt-wrap">
            <div class="prompt-input-row">
                <button class="settings-btn" onclick="openSettings()">⚙️ AI</button>
                <input type="text" id="prompt-input" placeholder="Describe the app you want to build...">
                <button id="gen-btn" class="btn" onclick="generateApp()">Build</button>
            </div>
        </div>
    </div>
</div>

<!-- Chat Panel -->
<div id="chat-panel" class="chat-panel">
    <div class="chat-header">
        <span style="font-weight: bold; color: var(--accent); font-size: 0.8rem;">Qwen 0.5B Instruct</span>
        <div style="display: flex; gap: 10px; align-items: center;">
            <span onclick="toggleChatSettings()" style="cursor:pointer; font-size: 0.8rem;">⚙️</span>
            <span onclick="toggleChat()" style="cursor:pointer; font-weight: bold;">✕</span>
        </div>
    </div>
    <div id="chat-settings" style="display:none; padding: 10px; background: #222; border-bottom: 1px solid var(--border); font-size: 0.7rem;">
        <div class="setting-row">
            <div>
                <label>Temp</label>
                <input type="number" id="chat-temp" value="0.9" step="0.1" style="width: 40px; background: #000; color: #fff; border: 1px solid #444;">
            </div>
            <div>
                <label>Max Tokens</label>
                <input type="number" id="chat-tokens" value="850" style="width: 50px; background: #000; color: #fff; border: 1px solid #444;">
            </div>
        </div>
    </div>
    <div id="chat-messages" class="chat-messages"></div>
    <div class="chat-input-area">
        <input type="text" id="chat-input" placeholder="Ask anything..." style="flex-grow:1; background:#000; border:1px solid #333; color:#fff; padding:8px; border-radius:4px; outline:none;">
        <button onclick="sendChatMessage()" class="btn" style="padding: 5px 10px;">Send</button>
    </div>
</div>

<!-- AI Settings Modal -->
<div id="settings-modal" class="modal">
    <div class="modal-content">
        <h3 style="margin:0; color:var(--accent)">AI Configuration (Qwen 2.5)</h3>
        <div class="setting-group">
            <label>System Instruction (Max 2000 chars)</label>
            <textarea id="cfg-inst" rows="3" maxlength="2000">Create a complete, single-file HTML/CSS/JS app. Return ONLY raw code, no markdown formatting.</textarea>
        </div>
        <div class="setting-row">
            <div class="setting-group">
                <label>Tokens (Max 3640)</label>
                <input type="number" id="cfg-tokens" value="3500" max="3640">
            </div>
            <div class="setting-group">
                <label>Temperature</label>
                <input type="number" id="cfg-temp" value="0.75" step="0.05">
            </div>
        </div>
        <div class="setting-row">
            <div class="setting-group">
                <label>Memory (Last X msgs)</label>
                <input type="number" id="cfg-memory" value="0" max="100">
            </div>
            <div class="setting-group" style="flex-direction: row; align-items: center; gap: 10px; margin-top: 20px;">
                <input type="checkbox" id="cfg-stream" checked>
                <label>Streaming Mode (Real-time)</label>
            </div>
        </div>
        <button class="btn" onclick="closeSettings()">Save Settings</button>
    </div>
</div>

<!-- Editor / Stream Modal -->
<div id="editor-modal" class="modal">
    <div class="modal-content" style="max-width: 900px; height: 85vh;">
        <h3 id="editor-title" style="margin:0">Source Code</h3>
        <textarea id="code-editor" class="code-box"></textarea>
        <div style="display:flex; gap:10px">
            <button id="save-btn" class="btn" onclick="saveEdit()">Save & Sync</button>
            <button class="settings-btn" onclick="closeEditor()">Cancel</button>
        </div>
    </div>
</div>

<script>
    // --- CONFIG ---
    const TUNNEL = "https://believes-beer-nickel-commons.trycloudflare.com";
    const AUTH_KEY = "GCEjYEOQL";
    
    let apps = [];
    let currentTab = 'explore';
    let editingId = null;
    let currentReqId = null;
    let streamBuffer = "";
    
    // Chat State
    let chatHistory = [];
    let currentChatBubble = null;

    const myId = localStorage.getItem('bns_uid') || 'u_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('bns_uid', myId);

    const socket = io(TUNNEL, { auth: { token: AUTH_KEY } });

    // --- SOCKET EVENTS ---
    socket.on('connect', () => {
        document.getElementById('status-dot').classList.add('online');
        socket.emit('RemoteEvent', { type: 'sync' });
    });

    socket.on('RemoteEvent', (packet) => {
        const d = packet;
        if (d.type === 'app_push') {
            const i = apps.findIndex(a => a.id === d.app.id);
            if (i > -1) apps[i] = d.app; else apps.push(d.app);
            render();
        }
        if (d.type === 'app_del') {
            apps = apps.filter(a => a.id !== d.id);
            render();
        }
        if (d.type === 'sync') {
            apps.forEach(a => socket.emit('RemoteEvent', { type: 'app_push', app: a }));
        }
    });

    socket.on('ai_response', (data) => {
        if (data.reqId === currentReqId) {
            if (data.reqId.startsWith('chat_')) finalizeChat(data.text);
            else finalizeGeneration(data.text);
        }
    });

    socket.on('ai_stream_chunk', (data) => {
        if (data.reqId === currentReqId) {
            if (data.reqId.startsWith('chat_')) {
                streamBuffer += data.text;
                currentChatBubble.innerText = streamBuffer;
                const msgContainer = document.getElementById('chat-messages');
                msgContainer.scrollTop = msgContainer.scrollHeight;
            } else {
                streamBuffer += data.text;
                const editor = document.getElementById('code-editor');
                editor.value = streamBuffer;
                editor.scrollTop = editor.scrollHeight;
            }
        }
    });

    socket.on('ai_stream_end', (data) => {
        if (data.reqId === currentReqId) {
            if (data.reqId.startsWith('chat_')) finalizeChat(streamBuffer);
            else finalizeGeneration(streamBuffer);
        }
    });

    socket.on('ai_error', (data) => {
        if (data.reqId === currentReqId) {
            alert("AI Error: " + data.error);
            resetUI();
        }
    });

    // --- CHAT LOGIC ---
    function toggleChat() {
        const panel = document.getElementById('chat-panel');
        panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
    }

    function toggleChatSettings() {
        const s = document.getElementById('chat-settings');
        s.style.display = s.style.display === 'none' ? 'block' : 'none';
    }

    function sendChatMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text || currentReqId) return;

        // Add User Bubble
        addChatBubble(text, 'user');
        input.value = "";

        // Prepare AI Bubble
        currentChatBubble = addChatBubble("...", 'ai');
        streamBuffer = "";
        currentReqId = 'chat_' + Date.now();

        const config = {
            instruction: "You are a helpful assistant in the Build n Share app.",
            tokens: parseInt(document.getElementById('chat-tokens').value),
            temp: parseFloat(document.getElementById('chat-temp').value),
            stream: true
        };

        // Prefix for the 0.5b model
        const promptWithModel = `_qwen2.5:0.5b-instruct:${text}`;

        socket.emit('callai', {
            reqId: currentReqId,
            prompt: promptWithModel,
            config: config,
            memory: chatHistory.slice(-30) // Max 30 messages memory
        });
    }

    function addChatBubble(text, role) {
        const container = document.getElementById('chat-messages');
        const div = document.createElement('div');
        div.className = `chat-msg ${role}`;
        div.innerText = text;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
        return div;
    }

    function finalizeChat(text) {
        chatHistory.push({ role: 'user', content: streamBuffer }); // Simplified history
        currentReqId = null;
    }

    // --- APP LOGIC ---
    function generateApp() {
        const prompt = document.getElementById('prompt-input').value;
        if (!prompt) return;

        const config = {
            instruction: document.getElementById('cfg-inst').value,
            tokens: parseInt(document.getElementById('cfg-tokens').value),
            temp: parseFloat(document.getElementById('cfg-temp').value),
            stream: document.getElementById('cfg-stream').checked
        };

        currentReqId = 'gen_' + Date.now();
        streamBuffer = "";

        document.getElementById('gen-btn').disabled = true;
        document.getElementById('gen-btn').innerText = "Queued...";

        if(config.stream) {
            document.getElementById('editor-title').innerText = "Qwen is coding...";
            document.getElementById('code-editor').value = "";
            document.getElementById('editor-modal').style.display = 'flex';
            document.getElementById('save-btn').style.display = 'none';
        }

        // Default model is coder, so no prefix needed or use _qwen2.5-coder:1.5b:
        socket.emit('callai', {
            reqId: currentReqId,
            prompt: `_qwen2.5-coder:1.5b:${prompt}`,
            config: config
        });
    }

    function finalizeGeneration(text) {
        const cleanCode = text.replace(/```html/g, "").replace(/```/g, "").trim();
        const prompt = document.getElementById('prompt-input').value;
        
        const newApp = {
            id: 'app_' + Date.now(),
            owner: myId,
            name: prompt.substring(0, 30),
            code: cleanCode,
            time: Date.now()
        };

        socket.emit('RemoteEvent', { type: 'app_push', app: newApp });
        loadApp(newApp.id);
        resetUI();
    }

    function resetUI() {
        document.getElementById('gen-btn').disabled = false;
        document.getElementById('gen-btn').innerText = "Build";
        document.getElementById('prompt-input').value = "";
        document.getElementById('editor-modal').style.display = 'none';
        document.getElementById('save-btn').style.display = 'block';
        currentReqId = null;
    }

    function loadApp(id) {
        const app = apps.find(a => a.id === id);
        if (app) {
            document.getElementById('preview-frame').srcdoc = app.code;
            document.getElementById('url-display').value = `https://websim.ai/apps/${app.id}`;
        }
    }

    function deleteApp(id, e) {
        e.stopPropagation();
        if (confirm("Delete this app?")) {
            socket.emit('RemoteEvent', { type: 'app_del', id: id });
        }
    }

    function openEditor(id, e) {
        e.stopPropagation();
        const app = apps.find(a => a.id === id);
        editingId = id;
        document.getElementById('editor-title').innerText = "Edit Source Code";
        document.getElementById('code-editor').value = app.code;
        document.getElementById('editor-modal').style.display = 'flex';
    }

    function saveEdit() {
        const app = apps.find(a => a.id === editingId);
        if (app) {
            app.code = document.getElementById('code-editor').value;
            socket.emit('RemoteEvent', { type: 'app_push', app: app });
            loadApp(app.id);
            closeEditor();
        }
    }

    function render() {
        const list = document.getElementById('app-list');
        list.innerHTML = "";
        const filtered = currentTab === 'mine' ? apps.filter(a => a.owner === myId) : apps;

        filtered.sort((a,b) => b.time - a.time).forEach(app => {
            const isOwner = app.owner === myId;
            const div = document.createElement('div');
            div.className = "app-card";
            div.onclick = () => loadApp(app.id);
            div.innerHTML = `
                <div class="app-card-name">${app.name}</div>
                <div class="app-actions">
                    ${isOwner ? `<span class="action-link" onclick="openEditor('${app.id}', event)">Edit</span>` : ''}
                    ${isOwner ? `<span class="action-link" style="color:var(--error)" onclick="deleteApp('${app.id}', event)">Delete</span>` : ''}
                </div>
            `;
            list.appendChild(div);
        });
    }

    function setTab(t) {
        currentTab = t;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        render();
    }

    function openSettings() { document.getElementById('settings-modal').style.display = 'flex'; }
    function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }
    function closeEditor() { document.getElementById('editor-modal').style.display = 'none'; }

    document.getElementById('prompt-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') generateApp();
    });
    
    document.getElementById('chat-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendChatMessage();
    });
</script>
</body>
</html>
