<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build n Share | Local AI</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #121212;
            --accent: #00ff88;
            --text: #ffffff;
            --border: #222;
            --error: #ff4444;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 15px;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .nav-tabs {
            display: flex;
            background: #000;
            padding: 4px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: #666;
            padding: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: #222;
            color: white;
            border-radius: 6px;
        }

        .app-list {
            flex-grow: 1;
            overflow-y: auto;
        }

        .app-card {
            padding: 12px;
            background: #181818;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.2s;
        }

        .app-card:hover { border-color: var(--accent); }
        .app-card-name { font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; }

        .app-actions {
            display: flex;
            gap: 12px;
        }

        .action-btn {
            font-size: 0.75rem;
            color: #888;
            cursor: pointer;
            text-decoration: none;
        }

        .action-btn:hover { color: var(--accent); }
        .action-btn.del:hover { color: var(--error); }

        /* Main Content */
        .main {
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .browser-header {
            background: var(--panel);
            padding: 10px 15px;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid var(--border);
            align-items: center;
        }

        .url-bar {
            flex-grow: 1;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 12px;
            color: var(--accent);
            font-family: monospace;
            font-size: 0.85rem;
            outline: none;
        }

        .preview-frame {
            flex-grow: 1;
            background: white;
            border: none;
        }

        /* Prompt Bar */
        .prompt-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 700px;
            background: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
            display: flex;
            gap: 10px;
        }

        input#prompt-input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 1rem;
        }

        button#build-btn {
            background: var(--accent);
            color: black;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button#build-btn:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
        }

        /* Editor Modal */
        #editor-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            flex-direction: column;
            padding: 30px;
        }

        textarea#code-editor {
            flex-grow: 1;
            background: #000;
            color: #00ff00;
            font-family: 'Fira Code', monospace;
            padding: 20px;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 20px;
            resize: none;
        }

        .modal-btns { display: flex; gap: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div class="logo">BUILD N SHARE</div>
        
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="setTab('explore')">Explore</button>
            <button class="tab-btn" onclick="setTab('mine')">My Apps</button>
        </div>

        <div class="app-list" id="app-list">
            <!-- Apps will be injected here -->
        </div>
    </div>

    <div class="main">
        <div class="browser-header">
            <div style="color: #555; font-size: 1.2rem;">🌐</div>
            <input type="text" class="url-bar" id="url-display" value="https://websim.ai/local-qwen" readonly>
        </div>

        <iframe id="preview-frame" class="preview-frame" sandbox="allow-scripts allow-modals allow-forms allow-popups allow-same-origin"></iframe>

        <div class="prompt-container">
            <input type="text" id="prompt-input" placeholder="Describe the app you want to build...">
            <button id="build-btn" onclick="generateApp()">Build</button>
        </div>
    </div>
</div>

<!-- Editor Modal -->
<div id="editor-modal">
    <h2 style="margin-top: 0; color: var(--accent);">Edit Source Code</h2>
    <textarea id="code-editor"></textarea>
    <div class="modal-btns">
        <button class="tab-btn active" style="max-width: 150px; padding: 12px;" onclick="saveEdit()">Save Changes</button>
        <button class="tab-btn" style="max-width: 150px; padding: 12px;" onclick="closeEditor()">Cancel</button>
    </div>
</div>

<script>
    // --- CONFIGURATION ---
    const TUNNEL = "https://motel-gordon-cheap-potentially.trycloudflare.com";
    const AUTH_KEY = "w1NC2yNNO";

    // --- STATE ---
    let apps = [];
    let currentTab = 'explore';
    let editingId = null;
    const myId = localStorage.getItem('bns_uid') || 'u_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('bns_uid', myId);

    // --- SOCKET CONNECTION ---
    const socket = io(TUNNEL, { auth: { token: AUTH_KEY } });

    socket.on('connect', () => {
        console.log("Connected to server");
        socket.emit('RemoteEvent', { type: 'sync' });
    });

    socket.on('RemoteEvent', (packet) => {
        const d = packet.data;
        if (d.type === 'app_push') {
            const i = apps.findIndex(a => a.id === d.app.id);
            if (i > -1) apps[i] = d.app; else apps.push(d.app);
            render();
        }
        if (d.type === 'app_del') {
            apps = apps.filter(a => a.id !== d.id);
            render();
        }
        if (d.type === 'sync') {
            apps.forEach(a => socket.emit('RemoteEvent', { type: 'app_push', app: a }));
        }
    });

    // --- AI GENERATION (HARDCODED SETTINGS) ---
    let currentReqId = null;
    let currentPromptName = "";

    socket.on('ai_response', (data) => {
        if (data.reqId === currentReqId) {
            finalizeApp(data.text);
        }
    });

    socket.on('ai_error', (data) => {
        if (data.reqId === currentReqId) {
            alert("AI Error: " + data.error);
            resetUI();
        }
    });

    function generateApp() {
        const prompt = document.getElementById('prompt-input').value;
        if (!prompt) return;

        currentPromptName = prompt.substring(0, 25);
        currentReqId = 'req_' + Date.now();
        
        const btn = document.getElementById('build-btn');
        btn.disabled = true;
        btn.innerText = "Building...";

        // Requesting AI with hardcoded parameters
        socket.emit('callai', {
            reqId: currentReqId,
            prompt: prompt,
            options: {
                instruction: "Create a single-file HTML/CSS/JS app. Return ONLY raw code. No markdown.",
                tokens: 3500,    // Hardcoded
                temp: 0.75,      // Hardcoded
                memory: 0,       // Disabled
                stream: false    // Off
            }
        });
    }

    function finalizeApp(rawCode) {
        // Clean up markdown if the model includes it
        let code = rawCode.replace(/```html/g, "").replace(/```/g, "").trim();
        
        const newApp = {
            id: 'app_' + Date.now(),
            owner: myId,
            name: currentPromptName,
            code: code,
            time: Date.now()
        };

        apps.push(newApp);
        socket.emit('RemoteEvent', { type: 'app_push', app: newApp });
        
        load(newApp.id);
        resetUI();
    }

    function resetUI() {
        const btn = document.getElementById('build-btn');
        btn.disabled = false;
        btn.innerText = "Build";
        document.getElementById('prompt-input').value = "";
    }

    // --- APP MANAGEMENT ---
    function deleteApp(id, e) {
        e.stopPropagation();
        if (confirm("Are you sure you want to delete this app?")) {
            apps = apps.filter(a => a.id !== id);
            socket.emit('RemoteEvent', { type: 'app_del', id: id });
            render();
            if (document.getElementById('url-display').value.includes(id)) {
                document.getElementById('preview-frame').srcdoc = "";
            }
        }
    }

    function openEditor(id, e) {
        e.stopPropagation();
        const app = apps.find(a => a.id === id);
        if (!app) return;
        editingId = id;
        document.getElementById('code-editor').value = app.code;
        document.getElementById('editor-modal').style.display = 'flex';
    }

    function saveEdit() {
        const app = apps.find(a => a.id === editingId);
        if (app) {
            app.code = document.getElementById('code-editor').value;
            socket.emit('RemoteEvent', { type: 'app_push', app: app });
            load(app.id);
            closeEditor();
        }
    }

    function closeEditor() {
        document.getElementById('editor-modal').style.display = 'none';
        editingId = null;
    }

    function load(id) {
        const app = apps.find(a => a.id === id);
        if (app) {
            document.getElementById('preview-frame').srcdoc = app.code;
            document.getElementById('url-display').value = `https://websim.ai/apps/${app.id}`;
        }
    }

    function render() {
        const list = document.getElementById('app-list');
        list.innerHTML = "";
        const filtered = currentTab === 'mine' ? apps.filter(a => a.owner === myId) : apps;

        filtered.sort((a,b) => b.time - a.time).forEach(app => {
            const isOwner = app.owner === myId;
            const div = document.createElement('div');
            div.className = "app-card";
            div.onclick = () => load(app.id);
            div.innerHTML = `
                <div class="app-card-name">${app.name}</div>
                <div class="app-actions">
                    ${isOwner ? `
                        <span class="action-btn" onclick="openEditor('${app.id}', event)">Edit</span>
                        <span class="action-btn del" onclick="deleteApp('${app.id}', event)">Delete</span>
                    ` : '<span style="color:#444">Shared App</span>'}
                </div>
            `;
            list.appendChild(div);
        });
    }

    function setTab(t) {
        currentTab = t;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        render();
    }

    // Enter key support
    document.getElementById('prompt-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') generateApp();
    });
</script>
</body>
</html>
