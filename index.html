    function buildMapFromData() {
        worldObjects.forEach(obj => scene.remove(obj.mesh));
        worldObjects = [];
        const houseMat = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
        const trunkMat = new THREE.MeshLambertMaterial({ color: 0x5D4037 });
        const leafMat = new THREE.MeshLambertMaterial({ color: 0x2E7D32 });

        mapData.forEach(data => {
            if(data.type === 'house') {
                const geo = new THREE.BoxGeometry(data.w, data.h, data.d);
                const mesh = new THREE.Mesh(geo, houseMat);
                mesh.position.set(data.x, data.h/2, data.z);
                scene.add(mesh);
                const box = new THREE.Box3().setFromObject(mesh);
                worldObjects.push({ mesh: mesh, box: box });
            } else if (data.type === 'tree') {
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 4), trunkMat);
                trunk.position.set(data.x, 2, data.z);
                const leaves = new THREE.Mesh(new THREE.ConeGeometry(3, 6), leafMat);
                leaves.position.set(data.x, 7, data.z);
                scene.add(trunk);
                scene.add(leaves);
                const box = new THREE.Box3().setFromObject(trunk);
                worldObjects.push({ mesh: trunk, box: box });
            }
        });
    }

            for(let i=0; i<e.changedTouches.length; i++) {

            for(let i=0; i<e.changedTouches.length; i++) {

    function handleJoystick(zone, stick, callback) {
        let maxR = 40, activeId = null, centerX, centerY;
        
        zone.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.changedTouches[0];
            activeId = touch.identifier;
            let rect = zone.getBoundingClientRect();
            centerX = rect.left + rect.width/2; 
            centerY = rect.top + rect.height/2;
            updateStick(touch);
        }, {passive:false});

        window.addEventListener('touchmove', (e) => {
            if(activeId === null) return;
            for(let i=0; i<e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if(touch.identifier === activeId) {
                    updateStick(touch);
                }
            }
        }, {passive:false});

        window.addEventListener('touchend', (e) => {
            for(let i=0; i<e.changedTouches.length; i++) {
                if(e.changedTouches[i].identifier === activeId) {
                    activeId = null;
                    stick.style.transform = `translate(-50%, -50%)`;
                    callback(0, 0);
                }
            }
        }, {passive:false});

        function updateStick(touch) {
            let dx = touch.clientX - centerX, dy = touch.clientY - centerY, dist = Math.sqrt(dx*dx + dy*dy);
            if(dist > maxR) { dx = (dx/dist)*maxR; dy = (dy/dist)*maxR; }
            stick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            callback(dx/maxR, dy/maxR);
        }
    }

    function bindTouch(id, cb) {

    function shoot() {
        if(isDead || isReloading || ammo <= 0 || Date.now() - lastShotTime < 100) return;
        ammo--;
        lastShotTime = Date.now();
        updateHUD();
        pitchObject.rotation.x += 0.05 + (Math.random() * 0.02);
        myGun.position.z = -0.4;
        
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
        
        let hitPos = raycaster.ray.origin.clone().add(raycaster.ray.direction.clone().multiplyScalar(100));
        let hitTargets = [];
        for(let id in players) {
            if(players[id].team !== myTeam) {
                const intersects = raycaster.intersectObject(players[id].group, true);
                if(intersects.length > 0) hitTargets.push({ id: id, intersect: intersects[0] });
            }
        }
        
        const worldIntersects = raycaster.intersectObjects(worldObjects.map(o => o.mesh));
        if(worldIntersects.length > 0) {
            hitPos = worldIntersects[0].point;
        }

        if(hitTargets.length > 0) {
            hitTargets.sort((a, b) => a.intersect.distance - b.intersect.distance);
            const hit = hitTargets[0];
            if(worldIntersects.length === 0 || hit.intersect.distance < worldIntersects[0].distance) {
                const isHeadshot = hit.intersect.object.name === 'head';
                const dmg = isHeadshot ? 20 : 10;
                socket.emit('RemoteEvent', { type: 'damage', target: hit.id, dmg: dmg, shooter: myId });
                hitPos = hit.intersect.point;
            }
        }
        
        const startPos = new THREE.Vector3();
        myGun.getWorldPosition(startPos);
        createBullet(startPos, hitPos);
        socket.emit('RemoteEvent', { type: 'shoot', id: myId, from: startPos, to: hitPos });
    }

    function createBullet(from, to) {
        const material = new THREE.MeshBasicMaterial({ color: 0xffff00 });
        const distance = from.distanceTo(to);
        const geometry = new THREE.CylinderGeometry(0.02, 0.02, distance, 8);
        const bullet = new THREE.Mesh(geometry, material);
        bullet.position.copy(from);
        bullet.lookAt(to);
        bullet.rotateX(Math.PI / 2);
        bullet.translateY(distance / 2);
        scene.add(bullet);
        bullets.push({ mesh: bullet, time: Date.now() });
    }

    function showChatBubble(id, text) {
        const p = id === myId ? { group: yawObject, nameSprite: null } : players[id];
        if(!p) return;

        if(p.chatBubble) scene.remove(p.chatBubble);

        const canvas = document.createElement('canvas');
        canvas.width = 512; canvas.height = 128;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0,0,512,128);
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 4; ctx.strokeRect(0,0,512,128);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 40px Arial'; ctx.textAlign = 'center';
        ctx.fillText(text, 256, 75);
        
        const tex = new THREE.CanvasTexture(canvas);
        const mat = new THREE.SpriteMaterial({ map: tex, depthTest: true });
        const sprite = new THREE.Sprite(mat);
        sprite.scale.set(4, 1, 1);
        sprite.position.set(0, 3.5, 0);
        
        if(id === myId) {
            yawObject.add(sprite);
            p.chatBubble = sprite;
        } else {
            p.group.add(sprite);

            const p = players[data.id];
            p.targetPos.set(data.x, data.y, data.z);
            p.targetRot = data.rot; p.isMoving = data.move;
            if(p.meshBody) {
                p.meshBody.material.color.setHex(data.team === 'Terminadores' ? 0xff4444 : 0x4444ff);
                p.team = data.team; if(p.nameSprite) p.nameSprite.visible = (p.team === myTeam);
            }
        }
        if(data.type === 'shoot' && data.id !== myId) createBullet(data.from, data.to);
        if(data.type === 'chat') showChatBubble(data.id, data.text);
        if(data.type === 'damage' && data.target === myId) takeDamage(data.dmg);
        if(data.type === 'die' && players[data.id]) players[data.id].group.visible = false;
        if(data.type === 'respawn' && players[data.id]) players[data.id].group.visible = true;
        if(data.type === 'leave' && players[data.id]) { scene.remove(players[data.id].group); delete players[data.id]; }
        if(data.type === 'wipe') serverWipe();
    });

    window.addEventListener('beforeunload', () => socket.emit('RemoteEvent', { type: 'leave', id: myId }));

    function createPlayer(data) {
        const group = new THREE.Group();
        const mat = new THREE.MeshLambertMaterial({ color: data.team === 'Terminadores' ? 0xff4444 : 0x4444ff });
        const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.5, 0.5), mat);
        body.position.y = 0.75; body.name = 'body';
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), mat);
        head.position.y = 1.9; head.name = 'head';
        const armL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1, 0.3), mat);
        armL.position.set(-0.7, 1, 0);
        const armR = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1, 0.3), mat);
        armR.position.set(0.7, 1, 0);
        const rGun = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.8), new THREE.MeshLambertMaterial({ color: 0x222 }));
        rGun.position.set(0.7, 0.8, -0.4);
        group.add(body, head, armL, armR, rGun);
        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 64;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = data.team === 'Terminadores' ? '#ff4444' : '#4444ff';
        ctx.font = '32px monospace'; ctx.textAlign = 'center';
        ctx.fillText(data.name, 128, 40);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), depthTest: false }));
        sprite.position.y = 2.5; sprite.scale.set(4, 1, 1);
        sprite.visible = (data.team === myTeam);
        group.add(sprite);
        scene.add(group);
        players[data.id] = { group, meshBody: body, armL, armR, nameSprite: sprite, targetPos: new THREE.Vector3(data.x, data.y, data.z), targetRot: data.rot, isMoving: false, animTime: 0, team: data.team, name: data.name };
    }

    function sendSync() {
        if(!scene || isDead) return;
        const isMoving = moveForward || moveBackward || moveLeft || moveRight || joyLeftData.x !== 0 || joyLeftData.y !== 0;
        socket.emit('RemoteEvent', { type: 'sync', id: myId, name: myName, team: myTeam, x: yawObject.position.x, y: yawObject.position.y, z: yawObject.position.z, rot: yawObject.rotation.y, move: isMoving });
    }

    function animate() {
        requestAnimationFrame(animate);
        if(!scene) return;
        const delta = clock.getDelta();
        checkAFK(); checkServerTimer();

        if(!isDead) {
            if(shootActive) shoot();
            myGun.position.z += ( -0.5 - myGun.position.z ) * 0.1;
            velocity.x -= velocity.x * 10.0 * delta;
            velocity.z -= velocity.z * 10.0 * delta;
            velocity.y -= 9.8 * 4.0 * delta;

            direction.z = (Number(moveBackward) - Number(moveForward)) + joyLeftData.y;
            direction.x = (Number(moveRight) - Number(moveLeft)) + joyLeftData.x;
            if(direction.length() > 0) direction.normalize();

            const speed = 50.0;
            velocity.z += direction.z * speed * delta;
            velocity.x += direction.x * speed * delta;

            const oldPos = yawObject.position.clone();
            yawObject.translateX(velocity.x * delta);
            yawObject.translateY(velocity.y * delta);
            yawObject.translateZ(velocity.z * delta);

            if (yawObject.position.y < 2) { velocity.y = 0; yawObject.position.y = 2; canJump = true; }

            yawObject.position.x = Math.max(-245, Math.min(245, yawObject.position.x));
            yawObject.position.z = Math.max(-245, Math.min(245, yawObject.position.z));

            playerBox.setFromCenterAndSize(yawObject.position.clone().setY(1), new THREE.Vector3(1, 2, 1));
            if(worldObjects.some(obj => playerBox.intersectsBox(obj.box))) yawObject.position.copy(oldPos);
        }

        bullets = bullets.filter(b => {
            if(Date.now() - b.time > 100) { scene.remove(b.mesh); return false; }
            return true;
        });

        for(let id in players) {
            const p = players[id];
            p.group.position.lerp(p.targetPos, 0.2);
            let diff = p.targetRot - p.group.rotation.y;
            while(diff < -Math.PI) diff += Math.PI * 2;
            while(diff > Math.PI) diff -= Math.PI * 2;
            p.group.rotation.y += diff * 0.2;
            if(p.isMoving) { p.animTime += delta * 10; p.armL.rotation.x = Math.sin(p.animTime) * 0.5; p.armR.rotation.x = -Math.sin(p.animTime) * 0.5; }
            else { p.armL.rotation.x = 0; p.armR.rotation.x = 0; }
        }
        renderer.render(scene, camera);
    }

    function checkAFK() { if(Date.now() - afkTimer > 60000) { socket.emit('RemoteEvent', { type: 'leave', id: myId }); location.reload(); } }
    function checkServerTimer() {
        if(serverStartTime === 0) return;
        const remaining = (3 * 60 * 1000) - (Date.now() - serverStartTime);
        if(remaining <= 0) { if(isHost) socket.emit('RemoteEvent', { type: 'wipe' }); serverWipe(); }
        else {
            const mins = Math.floor(remaining / 60000).toString().padStart(2, '0');
            const secs = Math.floor((remaining % 60000) / 1000).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `Map Reset: ${mins}:${secs}`;
        }
    }

    function serverWipe() {
        if(deviceType === 'computer') document.exitPointerLock();
        for(let id in players) scene.remove(players[id].group);
        worldObjects.forEach(obj => scene.remove(obj.mesh));
        players = {}; worldObjects = []; mapData = []; isHost = false; serverStartTime = 0;
        document.getElementById('game-canvas').style.display = 'none';
        document.getElementById('hud').style.display = 'none';
        document.getElementById('mobile-controls').style.display = 'none';
        document.getElementById('ui-team').classList.remove('hidden');
    }

    window.addEventListener('resize', () => {
        if(!camera) return; camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
