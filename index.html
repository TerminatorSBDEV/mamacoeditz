<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>snake.io | Server-Side Physics</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --accent: #00ff88; --bg: #050505; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; touch-action: none; user-select: none; }
        canvas { display: block; }

        /* UI de Login */
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .box { background: #111; padding: 30px; border-radius: 15px; border: 2px solid var(--accent); text-align: center; width: 280px; }
        input { 
            width: 100%; padding: 12px; margin: 10px 0; background: #000; 
            border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; outline: none;
        }
        button { 
            width: 100%; padding: 12px; background: var(--accent); border: none; 
            color: black; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px;
        }

        /* Notificações */
        #notification-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; pointer-events: none; }
        .notif { background: rgba(0, 0, 0, 0.8); border-left: 4px solid var(--accent); color: white; padding: 10px 20px; border-radius: 4px; margin-bottom: 5px; animation: fadeIn 0.3s; font-size: 0.8rem; }

        /* Leaderboard */
        #leaderboard {
            position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.6);
            padding: 12px; border-radius: 8px; font-family: monospace; pointer-events: none; border: 1px solid #222;
        }

        /* Controles Mobile */
        #joystick-ui { position: fixed; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; touch-action: none; }
        #joystick-knob { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: var(--accent); border-radius: 50%; opacity: 0.5; pointer-events: none; }
        #boost-btn { 
            position: fixed; bottom: 60px; right: 40px; width: 80px; height: 80px; 
            background: rgba(255,255,255,0.1); border: 2px solid var(--accent); 
            border-radius: 50%; display: none; align-items: center; justify-content: center;
            font-weight: bold; color: var(--accent); touch-action: none;
        }

        #respawn-msg { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; font-weight: bold; color: var(--accent); display: none; text-align: center; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="notification-container"></div>
<div id="overlay">
    <div class="box">
        <h1 style="color: var(--accent); margin: 0 0 20px 0;">SNAKE.IO</h1>
        <input type="text" id="nickname" placeholder="Nickname" maxlength="10">
        <div style="text-align: left; font-size: 0.7rem; color: #888;">SKIN COLOR (No Black)</div>
        <input type="color" id="skinColor" value="#00ff88">
        <button onclick="startGame()">START</button>
    </div>
</div>

<div id="respawn-msg">WASTED<br><span style="font-size: 1rem;">Respawning in <span id="timer">3</span>s...</span></div>
<div id="leaderboard"><div id="rank-list"></div></div>

<div id="joystick-ui"><div id="joystick-knob"></div></div>
<div id="boost-btn">BOOST</div>

<canvas id="gameCanvas"></canvas>

<script>
    // --- CONFIG ---
    const TUNNEL = "https://leaf-revenue-agriculture-pole.trycloudflare.com";
    const AUTH_KEY = "AnrPqkfIi";
    const socket = io(TUNNEL, { auth: { token: AUTH_KEY } });

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const MAP_SIZE = 3000;
    const LERP_FACTOR = 0.2; 

    let myId = Math.random().toString(36).substr(2, 9);
    let gameActive = false;
    let isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    let isHost = false;

    let me = {
        id: myId, name: "", x: 1500, y: 1500, angle: 0, targetAngle: 0,
        speed: 3.5, baseSpeed: 3.5, boostSpeed: 7,
        segments: [], len: 15, color: "#00ff88", radius: 12,
        isBoosting: false, lastUpdate: Date.now()
    };

    let others = {};
    let foods = [];
    let camera = { x: 0, y: 0 };

    // --- HELPERS ---
    function getBrightness(hex) {
        hex = hex.replace('#', '');
        const r = parseInt(hex.substr(0, 2), 16);
        const g = parseInt(hex.substr(2, 2), 16);
        const b = parseInt(hex.substr(4, 2), 16);
        return (r * 299 + g * 587 + b * 114) / 1000;
    }

    // --- CONTROLS ---
    if (isMobile) {
        document.getElementById('joystick-ui').style.display = 'block';
        document.getElementById('boost-btn').style.display = 'flex';
        
        const joystick = document.getElementById('joystick-ui');
        const knob = document.getElementById('joystick-knob');
        
        const handleTouch = (e) => {
            const touch = Array.from(e.touches).find(t => t.target.id === 'joystick-ui' || t.target.id === 'joystick-knob');
            if (touch) {
                const rect = joystick.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const dx = touch.clientX - centerX;
                const dy = touch.clientY - centerY;
                me.targetAngle = Math.atan2(dy, dx);
                const dist = Math.min(40, Math.hypot(dx, dy));
                knob.style.transform = `translate(${Math.cos(me.targetAngle)*dist}px, ${Math.sin(me.targetAngle)*dist}px)`;
            }
        };

        joystick.addEventListener('touchstart', handleTouch);
        joystick.addEventListener('touchmove', handleTouch);
        joystick.addEventListener('touchend', () => {
            knob.style.transform = `translate(0,0)`;
        });

        const bBtn = document.getElementById('boost-btn');
        bBtn.addEventListener('touchstart', (e) => { e.preventDefault(); me.isBoosting = true; });
        bBtn.addEventListener('touchend', (e) => { e.preventDefault(); me.isBoosting = false; });
    } else {
        window.addEventListener('mousemove', e => {
            const dx = e.clientX - window.innerWidth / 2;
            const dy = e.clientY - window.innerHeight / 2;
            me.targetAngle = Math.atan2(dy, dx);
        });
        window.addEventListener('keydown', e => { if(e.code === 'Space') me.isBoosting = true; });
        window.addEventListener('keyup', e => { if(e.code === 'Space') me.isBoosting = false; });
    }

    // --- NETWORK ---
    socket.on('server_action', d => { 
        if(d.action === 'notification') showNotif(d.msg); 
    });
    
    socket.on('RemoteEvent', p => {
        // Movement is now "Server-Relayed"
        if (p.type === 'move') {
            if (p.id === myId) {
                // Sync my own position from the "Server" relay
                me.x = p.x;
                me.y = p.y;
                me.segments = p.segments;
                me.len = p.len;
            } else {
                if (!others[p.id]) {
                    others[p.id] = p;
                    others[p.id].currentX = p.x;
                    others[p.id].currentY = p.y;
                } else {
                    others[p.id].targetX = p.x;
                    others[p.id].targetY = p.y;
                    others[p.id].angle = p.angle;
                    others[p.id].segments = p.segments;
                    others[p.id].len = p.len;
                    others[p.id].lastUpdate = Date.now();
                }
            }
        }
        if (p.type === 'die') {
            if (p.id === myId) handleDeath();
            delete others[p.id];
        }
        if (p.type === 'food_update') foods = p.foods;
        if (p.type === 'sync_request') isHost = true; // If someone asks for sync and I'm here, I might be host
    });

    function startGame() {
        me.name = document.getElementById('nickname').value || "Snake";
        let color = document.getElementById('skinColor').value;
        if (getBrightness(color) < 40) color = "#00ff88"; // Block black
        me.color = color;
        document.getElementById('overlay').style.display = 'none';
        me.segments = Array(Math.floor(me.len)).fill({x: me.x, y: me.y});
        gameActive = true;
        
        // Request initial state
        socket.emit('RemoteEvent', { type: 'sync_request' });
        if (!isHost) setTimeout(() => { if(foods.length === 0) { isHost = true; spawnFood(); } }, 1000);
    }

    function spawnFood() {
        if (!isHost) return;
        let f = [];
        for(let i=0; i<150; i++) {
            f.push({
                id: Math.random().toString(36).substr(2,5), 
                x: Math.random()*MAP_SIZE, 
                y: Math.random()*MAP_SIZE, 
                c: `hsl(${Math.random()*360},100%,50%)`, 
                s: 3
            });
        }
        foods = f;
        socket.emit('RemoteEvent', { type: 'food_update', foods: foods });
    }

    // --- PHYSICS (Simulated as Server-Side) ---
    function update() {
        if (!gameActive) return;

        // 1. Calculate Intended Movement
        let currentSpeed = (me.isBoosting && me.len > 10) ? me.boostSpeed : me.baseSpeed;
        if (me.isBoosting && me.len > 10) me.len -= 0.1;

        let diff = me.targetAngle - me.angle;
        while (diff < -Math.PI) diff += Math.PI * 2;
        while (diff > Math.PI) diff -= Math.PI * 2;
        me.angle += diff * 0.1;

        let nextX = me.x + Math.cos(me.angle) * currentSpeed;
        let nextY = me.y + Math.sin(me.angle) * currentSpeed;

        // 2. Boundary Check
        if (nextX < 0 || nextX > MAP_SIZE || nextY < 0 || nextY > MAP_SIZE) {
            die();
            return;
        }

        // 3. Update Segments
        let newSegments = [{ x: nextX, y: nextY }, ...me.segments];
        if (newSegments.length > me.len) newSegments.pop();

        // 4. Collision Detection (Head to Body)
        Object.values(others).forEach(p => {
            p.segments.forEach((seg, idx) => {
                if (idx < 3) return; // Skip head
                if (Math.hypot(nextX - seg.x, nextY - seg.y) < me.radius * 1.2) {
                    die();
                }
            });
        });

        // 5. Food Detection
        let ate = false;
        foods.forEach((f, i) => {
            if (Math.hypot(nextX - f.x, nextY - f.y) < me.radius + 10) {
                me.len += 3;
                foods.splice(i, 1);
                ate = true;
            }
        });

        if (ate && isHost) {
            // Respawn food if host
            foods.push({
                id: Math.random().toString(36).substr(2,5), 
                x: Math.random()*MAP_SIZE, 
                y: Math.random()*MAP_SIZE, 
                c: `hsl(${Math.random()*360},100%,50%)`, 
                s: 3
            });
            socket.emit('RemoteEvent', { type: 'food_update', foods: foods });
        } else if (ate && !isHost) {
            // Notify host/others that food is gone
            socket.emit('RemoteEvent', { type: 'food_update', foods: foods });
        }

        // 6. BROADCAST (This is the "Server" part - we only move when this returns)
        socket.emit('RemoteEvent', { 
            type: 'move', 
            id: myId, 
            name: me.name, 
            x: nextX, 
            y: nextY, 
            angle: me.angle, 
            segments: newSegments, 
            color: me.color, 
            len: me.len 
        });

        // Cleanup inactive players
        const now = Date.now();
        Object.keys(others).forEach(id =>
