<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>snake.io | Pro Edition</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --accent: #00ff88; --bg: #050505; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; touch-action: none; user-select: none; }
        canvas { display: block; }

        /* UI de Login */
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .box { background: #111; padding: 30px; border-radius: 15px; border: 2px solid var(--accent); text-align: center; width: 280px; }
        input { 
            width: 100%; padding: 12px; margin: 10px 0; background: #000; 
            border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; outline: none;
        }
        button { 
            width: 100%; padding: 12px; background: var(--accent); border: none; 
            color: black; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px;
        }

        /* Notificações */
        #notification-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; pointer-events: none; }
        .notif { background: rgba(0, 0, 0, 0.8); border-left: 4px solid var(--accent); color: white; padding: 10px 20px; border-radius: 4px; margin-bottom: 5px; animation: fadeIn 0.3s; }

        /* Leaderboard */
        #leaderboard {
            position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.6);
            padding: 12px; border-radius: 8px; font-family: monospace; pointer-events: none; border: 1px solid #222;
        }

        /* Controles Mobile */
        #joystick-ui { position: fixed; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; touch-action: none; }
        #joystick-knob { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: var(--accent); border-radius: 50%; opacity: 0.5; }
        #boost-btn { 
            position: fixed; bottom: 60px; right: 40px; width: 80px; height: 80px; 
            background: rgba(255,255,255,0.1); border: 2px solid var(--accent); 
            border-radius: 50%; display: none; align-items: center; justify-content: center;
            font-weight: bold; color: var(--accent); touch-action: none;
        }

        #respawn-msg { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; font-weight: bold; color: var(--accent); display: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="notification-container"></div>
<div id="overlay">
    <div class="box">
        <h1 style="color: var(--accent); margin: 0 0 20px 0;">SNAKE.IO</h1>
        <input type="text" id="nickname" placeholder="Nickname" maxlength="10">
        <div style="text-align: left; font-size: 0.7rem; color: #888;">SKIN COLOR</div>
        <input type="color" id="skinColor" value="#00ff88">
        <button onclick="startGame()">START</button>
    </div>
</div>

<div id="respawn-msg">Respawning in <span id="timer">3</span>s...</div>
<div id="leaderboard"><div id="rank-list"></div></div>

<div id="joystick-ui"><div id="joystick-knob"></div></div>
<div id="boost-btn">BOOST</div>

<canvas id="gameCanvas"></canvas>

<script>
    const TUNNEL = "https://leaf-revenue-agriculture-pole.trycloudflare.com";
    const AUTH_KEY = "AnrPqkfIi";
    const socket = io(TUNNEL, { auth: { token: AUTH_KEY } });

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const MAP_SIZE = 3000;
    const LERP_FACTOR = 0.15; // Suavidade do movimento alheio

    let myId = Math.random().toString(36).substr(2, 9);
    let gameActive = false;
    let isMobile = 'ontouchstart' in window;

    let me = {
        id: myId, name: "", x: 1500, y: 1500, angle: 0, targetAngle: 0,
        speed: 3.5, baseSpeed: 3.5, boostSpeed: 7,
        segments: [], len: 15, color: "#00ff88", radius: 12,
        isBoosting: false
    };

    let others = {};
    let foods = [];
    let camera = { x: 0, y: 0 };

    // --- CONTROLES ---
    if (isMobile) {
        document.getElementById('joystick-ui').style.display = 'block';
        document.getElementById('boost-btn').style.display = 'flex';
        
        const joystick = document.getElementById('joystick-ui');
        const knob = document.getElementById('joystick-knob');
        
        window.addEventListener('touchmove', e => {
            const touch = Array.from(e.touches).find(t => t.target.closest('#joystick-ui'));
            if (touch) {
                const rect = joystick.getBoundingClientRect();
                const dx = touch.clientX - (rect.left + rect.width/2);
                const dy = touch.clientY - (rect.top + rect.height/2);
                me.targetAngle = Math.atan2(dy, dx);
                const dist = Math.min(40, Math.hypot(dx, dy));
                knob.style.transform = `translate(${Math.cos(me.targetAngle)*dist}px, ${Math.sin(me.targetAngle)*dist}px)`;
            }
        });

        const bBtn = document.getElementById('boost-btn');
        bBtn.addEventListener('touchstart', () => me.isBoosting = true);
        bBtn.addEventListener('touchend', () => me.isBoosting = false);
    } else {
        window.addEventListener('mousemove', e => {
            const dx = e.clientX - window.innerWidth / 2;
            const dy = e.clientY - window.innerHeight / 2;
            me.targetAngle = Math.atan2(dy, dx);
        });
        window.addEventListener('keydown', e => { if(e.code === 'Space') me.isBoosting = true; });
        window.addEventListener('keyup', e => { if(e.code === 'Space') me.isBoosting = false; });
    }

    // --- NETWORK ---
    socket.on('server_action', d => { if(d.action === 'notification') showNotif(d.msg); });
    
    socket.on('RemoteEvent', p => {
        if (p.type === 'move') {
            if (p.id === myId) return;
            if (!others[p.id]) {
                others[p.id] = p;
                others[p.id].currentX = p.x;
                others[p.id].currentY = p.y;
            } else {
                // Atualiza alvos para o LERP
                others[p.id].targetX = p.x;
                others[p.id].targetY = p.y;
                others[p.id].angle = p.angle;
                others[p.id].segments = p.segments;
                others[p.id].len = p.len;
                others[p.id].lastUpdate = Date.now();
            }
        }
        if (p.type === 'die') delete others[p.id];
        if (p.type === 'food') foods = p.foods;
        if (p.type === 'eat') foods = foods.filter(f => f.id !== p.fid);
    });

    function startGame() {
        me.name = document.getElementById('nickname').value || "Snake";
        let color = document.getElementById('skinColor').value;
        // Impedir cor preta (muito escura)
        if (parseInt(color.replace('#',''), 16) < 0x111111) color = "#00ff88";
        me.color = color;
        document.getElementById('overlay').style.display = 'none';
        me.segments = Array(Math.floor(me.len)).fill({x: me.x, y: me.y});
        gameActive = true;
        if(foods.length === 0) spawnFood();
    }

    function spawnFood() {
        let f = [];
        for(let i=0; i<100; i++) f.push({id: Math.random().toString(36).substr(2,5), x: Math.random()*MAP_SIZE, y: Math.random()*MAP_SIZE, c: `hsl(${Math.random()*360},100%,50%)`, s: 3});
        foods = f;
        socket.emit('RemoteEvent', { type: 'food', foods: foods });
    }

    function update() {
        if (!gameActive) return;

        // Speed Boost Logic
        if (me.isBoosting && me.len > 10) {
            me.speed = me.boostSpeed;
            me.len -= 0.15; // Perda de pontos ao correr
        } else {
            me.speed = me.baseSpeed;
        }

        // Smooth Turn
        let diff = me.targetAngle - me.angle;
        while (diff < -Math.PI) diff += Math.PI * 2;
        while (diff > Math.PI) diff -= Math.PI * 2;
        me.angle += diff * 0.1;

        me.x += Math.cos(me.angle) * me.speed;
        me.y += Math.sin(me.angle) * me.speed;

        // Borda
        if (me.x < 0 || me.x > MAP_SIZE || me.y < 0 || me.y > MAP_SIZE) die();

        me.segments.unshift({ x: me.x, y: me.y });
        if (me.segments.length > me.len) me.segments.pop();

        // Comida
        foods.forEach((f, i) => {
            if (Math.hypot(me.x - f.x, me.y - f.y) < me.radius + 10) {
                me.len += 2;
                socket.emit('RemoteEvent', { type: 'eat', fid: f.id });
                foods.splice(i, 1);
            }
        });

        // Colisão e Limpeza de Inativos
        const now = Date.now();
        Object.keys(others).forEach(id => {
            const p = others[id];
            // Remove se não houver update por 2 segundos
            if (now - p.lastUpdate > 2000) { delete others[id]; return; }

            p.segments.forEach((seg, idx) => {
                if (idx < 4) return;
                if (Math.hypot(me.x - seg.x, me.y - seg.y) < me.radius * 1.2) die();
            });
        });

        socket.emit('RemoteEvent', { type: 'move', id: myId, name: me.name, x: me.x, y: me.y, angle: me.angle, segments: me.segments, color: me.color, len: me.len });
        updateRank();
    }

    function die() {
        gameActive = false;
        socket.emit('RemoteEvent', { type: 'die', id: myId });
        const msg = document.getElementById('respawn-msg');
        msg.style.display = 'block';
        let c = 3;
        const t = setInterval(() => {
            document.getElementById('timer').innerText = --c;
            if(c<=0) { clearInterval(t); msg.style.display='none'; respawn(); }
        }, 1000);
    }

    function respawn() {
        me.x = Math.random()*MAP_SIZE; me.y = Math.random()*MAP_SIZE;
        me.len = 15; me.segments = Array(15).fill({x: me.x, y: me.y});
        gameActive = true;
    }

    function draw() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, canvas.width, canvas.height);

        camera.x = me.x - canvas.width / 2;
        camera.y = me.y - canvas.height / 2;

        ctx.save();
        ctx.translate(-camera.x, -camera.y);

        // Grid
        ctx.strokeStyle = '#111';
        for(let i=0; i<=MAP_SIZE; i+=200) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, MAP_SIZE); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(MAP_SIZE, i); ctx.stroke();
        }

        foods.forEach(f => {
            ctx.fillStyle = f.c; ctx.beginPath(); ctx.arc(f.x, f.y, f.s, 0, Math.PI*2); ctx.fill();
        });

        // Draw Others with LERP
        Object.values(others).forEach(p => {
            // Interpolação Linear
            p.currentX += (p.targetX - p.currentX) * LERP_FACTOR;
            p.currentY += (p.targetY - p.currentY) * LERP_FACTOR;
            drawSnake(p, p.currentX, p.currentY);
        });

        if (gameActive) drawSnake(me, me.x, me.y);

        ctx.restore();
        requestAnimationFrame(draw);
    }

    function drawSnake(s, x, y) {
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.strokeStyle = s.color; ctx.lineWidth = s.radius * 2;
        ctx.beginPath();
        s.segments.forEach((seg, i) => {
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(seg.x, seg.y);
        });
        ctx.stroke();
        
        // Olhos
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(x + Math.cos(s.angle+0.5)*8, y + Math.sin(s.angle+0.5)*8, 3, 0, Math.PI*2);
        ctx.arc(x + Math.cos(s.angle-0.5)*8, y + Math.sin(s.angle-0.5)*8, 3, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = "rgba(255,255,255,0.3)";
        ctx.font = "10px Arial"; ctx.textAlign = "center";
        ctx.fillText(s.name, x, y - 20);
    }

    function updateRank() {
        let p = Object.values(others); p.push(me);
        p.sort((a,b) => b.len - a.len);
        document.getElementById('rank-list').innerHTML = p.slice(0,5).map((s,i) => `<div>${i+1}. ${s.name} (${Math.floor(s.len)})</div>`).join('');
    }

    function showNotif(m) {
        const c = document.getElementById('notification-container');
        const d = document.createElement('div'); d.className = 'notif'; d.innerText = m;
        c.appendChild(d); setTimeout(() => d.remove(), 4000);
    }

    setInterval(update, 1000 / 60);
    draw();
</script>
</body>
</html>
